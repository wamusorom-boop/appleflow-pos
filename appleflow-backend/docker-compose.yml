# AppleFlow POS - Docker Compose Configuration
# For local development and staging environments

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: appleflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-appleflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-appleflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appleflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appleflow-network

  # ============================================
  # Redis (for caching and sessions)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: appleflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appleflow-network

  # ============================================
  # Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appleflow-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-appleflow}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-appleflow}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      # M-Pesa
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT}
      MPESA_SHORT_CODE: ${MPESA_SHORT_CODE}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL}
      MPESA_CALLBACK_SECRET: ${MPESA_CALLBACK_SECRET}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appleflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: appleflow-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - appleflow-network

volumes:
  postgres_data:
  redis_data:

networks:
  appleflow-network:
    driver: bridge
